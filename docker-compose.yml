services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${RABBITMQ_HOST_AMQP_PORT}:5672"
      - "${RABBITMQ_HOST_UI_PORT}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  task_service:
    build:
      context: ./services/task_service
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${TASK_SERVICE_HOST_PORT}:${TASK_SERVICE_PORT}"

  processing_service:
    build:
      context: ./services/processing_service
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      task_service:
        condition: service_started

  event_publisher:
    build:
      context: ./services/event_publisher
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  websocket_service:
    build:
      context: ./services/websocket_service
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "${WEBSOCKET_HOST_PORT}:${WEBSOCKET_PORT}"

  api_gateway:
    build:
      context: ./services/api_gateway
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      task_service:
        condition: service_started
      websocket_service:
        condition: service_started
    ports:
      - "${API_GATEWAY_HOST_PORT}:${API_GATEWAY_PORT}"

volumes:
  postgres-data:
