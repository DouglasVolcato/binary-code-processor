              cpu: "300m"
              memory: "256Mi"
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: METRICS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EVENT_PUBLISHER_METRICS_PORT
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
